<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 英语打卡</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <span class="icon">📚</span>
            <span>英语打卡</span>
        </a>
        
        <ul class="navbar-menu">
            <li><a href="index.html">今日学习</a></li>
            <li><a href="rank.html">排行榜</a></li>
            <li><a href="stats.html">我的统计</a></li>
        </ul>
        
        <div class="navbar-user">
            <div class="navbar-avatar">U</div>
            <div class="navbar-dropdown">
                <a href="profile.html" class="active">👤 个人中心</a>
                <a href="admin.html" class="admin-link" style="display: none;">⚙️ 管理后台</a>
                <a href="#" onclick="App.logout(); return false;" class="danger">🚪 退出登录</a>
            </div>
        </div>
        
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
    
    <!-- 移动端侧边栏 -->
    <div class="sidebar-overlay"></div>
    <div class="sidebar">
        <ul class="sidebar-menu">
            <li><a href="index.html">📖 今日学习</a></li>
            <li><a href="rank.html">🏆 排行榜</a></li>
            <li><a href="stats.html">📊 我的统计</a></li>
            <li><a href="profile.html" class="active">👤 个人中心</a></li>
            <li><a href="admin.html" class="admin-link" style="display: none;">⚙️ 管理后台</a></li>
            <li><a href="#" onclick="App.logout(); return false;">🚪 退出登录</a></li>
        </ul>
    </div>
    
    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 用户信息卡片 -->
        <div class="card">
            <div class="user-info-card">
                <!-- 动态渲染 -->
            </div>
        </div>
        
        <!-- 修改密码 -->
        <div class="card">
            <h2 class="card-title">🔐 修改密码</h2>
            <form class="password-form">
                <div class="form-group">
                    <label class="form-label">原密码</label>
                    <input type="password" name="oldPassword" class="form-input" placeholder="请输入原密码" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="password" name="newPassword" class="form-input" placeholder="请输入新密码（6-20位）" required minlength="6" maxlength="20">
                </div>
                
                <div class="form-group">
                    <label class="form-label">确认新密码</label>
                    <input type="password" name="confirmPassword" class="form-input" placeholder="请再次输入新密码" required>
                </div>
                
                <button type="submit" class="btn btn-primary">修改密码</button>
            </form>
        </div>
    </main>
    
    <div class="toast"></div>
    
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
