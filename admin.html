<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 英语打卡</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <span class="icon">📚</span>
            <span>英语打卡</span>
        </a>
        
        <ul class="navbar-menu">
            <li><a href="index.html">今日学习</a></li>
            <li><a href="admin.html" class="active">管理后台</a></li>
        </ul>
        
        <div class="navbar-user">
            <div class="navbar-avatar">A</div>
            <div class="navbar-dropdown">
                <a href="profile.html">👤 个人中心</a>
                <a href="#" onclick="App.logout(); return false;" class="danger">🚪 退出登录</a>
            </div>
        </div>
        
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
    
    <!-- 管理后台布局 -->
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <ul class="admin-nav">
                <li>
                    <a href="admin.html" class="active">
                        <span class="icon">👥</span>
                        <span>用户管理</span>
                    </a>
                </li>
                <li>
                    <a href="index.html">
                        <span class="icon">🏠</span>
                        <span>返回首页</span>
                    </a>
                </li>
            </ul>
        </aside>
        
        <!-- 主内容区 -->
        <main class="admin-content">
            <div class="card">
                <div class="card-header">
                    <h1 class="card-title">👥 用户管理</h1>
                </div>
                
                <!-- 操作栏 -->
                <div class="search-bar">
                    <input type="text" class="form-input search-input" placeholder="搜索用户名或昵称...">
                    <button class="btn btn-primary add-user-btn">添加用户</button>
                </div>
                
                <!-- 用户表格 -->
                <div class="table-container">
                    <table class="table user-table">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>用户名</th>
                                <th>昵称</th>
                                <th>部门</th>
                                <th>连续天数</th>
                                <th>总天数</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 动态渲染 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 添加/编辑用户弹窗 -->
    <div class="modal-overlay user-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">添加用户</h3>
                <button class="modal-close" onclick="AdminPage.hideUserModal()">&times;</button>
            </div>
            <form onsubmit="event.preventDefault(); AdminPage.saveUser();">
                <input type="hidden" name="id">
                
                <div class="form-group">
                    <label class="form-label">用户名 *</label>
                    <input type="text" name="username" class="form-input" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">昵称 *</label>
                    <input type="text" name="nickname" class="form-input" placeholder="请输入昵称" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">工号</label>
                    <input type="text" name="workNo" class="form-input" placeholder="请输入工号">
                </div>
                
                <div class="form-group">
                    <label class="form-label">部门</label>
                    <input type="text" name="department" class="form-input" placeholder="请输入部门">
                </div>
                
                <div class="form-group">
                    <label class="form-label">初始密码</label>
                    <input type="password" name="password" class="form-input" placeholder="留空则默认为123456">
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="AdminPage.hideUserModal()">取消</button>
                    <button type="submit" class="btn btn-primary">确定</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="toast"></div>
    
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
